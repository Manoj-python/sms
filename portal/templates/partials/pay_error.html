<div class="alert alert-error">
  {% if error_key == 'pay_min_part' and min_amount is defined %}
    {{ t(error_key).format(amount='%.2f'|format(min_amount)) }}
  {% elif error_key == 'pay_exceeds_max' and max_amount is defined %}
    {{ t(error_key).format(amount='%.2f'|format(max_amount)) }}
  {% else %}
    {{ t(error_key) }}
  {% endif %}
</div>
<p><a class="btn-link" href="javascript:location.reload()">↻</a></p>
