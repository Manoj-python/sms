<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Block a Loan — SMSquare Staff</title>
  <script src="/static/js/htmx.min.js" defer></script>
  <style>
    :root {
      --navy: #12355b; --teal: #0e9494; --ink: #1c2b3a; --muted: #64748b;
      --border: #e2e8f0; --bg: #f8fafc; --card: #fff;
    }
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); margin: 0; color: var(--ink); }
    header {
      background: var(--navy); color: #fff; padding: 14px 24px;
      display: flex; justify-content: space-between; align-items: center;
      box-shadow: 0 1px 6px rgba(0,0,0,.15);
    }
    header strong { font-size: 15px; letter-spacing: .2px; }
    header nav a { color: #cbd5e1; text-decoration: none; font-size: 13px; margin-left: 18px; }
    header nav a:hover { color: #fff; }
    main { padding: 20px 24px 40px; max-width: 560px; margin: 0 auto; }

    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 20px 22px; box-shadow: 0 1px 3px rgba(0,0,0,.04);
    }
    label { display: block; font-size: 11px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .03em; color: var(--muted); margin: 12px 0 5px; }
    label:first-of-type { margin-top: 0; }
    input, textarea {
      width: 100%; padding: 8px 10px; border: 1px solid #cbd5e1; border-radius: 6px;
      font-size: 13px; background: #fff; font-family: inherit;
    }
    input:focus, textarea:focus { outline: 2px solid var(--teal); outline-offset: 1px; }
    .btn {
      padding: 8px 16px; border: none; border-radius: 6px; font-size: 13px; font-weight: 600;
      cursor: pointer; text-decoration: none; display: inline-flex; align-items: center; gap: 6px;
    }
    .btn-primary { background: var(--teal); color: #fff; }
    .btn-primary:hover { background: #0c7f7f; }
    .btn-primary:disabled { background: #94a3b8; cursor: not-allowed; }
    .back-link { display: inline-block; margin-top: 16px; color: var(--teal); text-decoration: none; font-size: 13px; }
  </style>
</head>
<body>
  <header>
    <strong>Block a Loan — SMSquare Staff</strong>
    <nav>
      <a href="/staff/report">Audit Report</a>
      <a href="/staff/blocked-loans">Blocked Loans</a>
      <a href="/staff/logout">Logout</a>
    </nav>
  </header>
  <main>
    <div class="card">
      <h2 style="margin-top:0">Block a Loan</h2>
      <div id="form-box">
        {% include "partials/staff_blocked_loan_form.html" %}
      </div>
    </div>
    <a class="back-link" href="/staff/blocked-loans">&larr; Back to Blocked Loans</a>
  </main>
</body>
</html>
